<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daedalus Chat</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header blur-effect">
            <div class="header-content">
                <div class="ai-avatar">
                    <div class="pulse-ring"></div>
                    <div class="avatar-core"></div>
                </div>
                <div class="header-info">
                    <h1>DAEDALUS</h1>
                    <span class="status">Online & Evolving</span>
                </div>
                <button id="new-chat-btn" class="icon-btn" aria-label="New Conversation">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        <line x1="12" y1="9" x2="12" y2="15"></line>
                        <line x1="9" y1="12" x2="15" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Nervous System Diagnostic Panel -->
        <div class="diagnostic-panel blur-effect" id="diagnostic-panel">
            <div class="diag-header" id="diag-toggle">
                <span class="diag-title">NERVOUS SYSTEM</span>
                <span class="diag-mood" id="diag-mood">--</span>
            </div>
            <div class="diag-body" id="diag-body">
                <div class="diag-row">
                    <span class="diag-label">Dopamine</span>
                    <div class="diag-bar-container bipolar">
                        <div class="diag-bar-fill dopamine" id="bar-dopamine"></div>
                        <div class="diag-bar-center"></div>
                    </div>
                    <span class="diag-value" id="val-dopamine">0.00</span>
                </div>
                <div class="diag-row">
                    <span class="diag-label">Serotonin</span>
                    <div class="diag-bar-container">
                        <div class="diag-bar-fill serotonin" id="bar-serotonin"></div>
                    </div>
                    <span class="diag-value" id="val-serotonin">0.70</span>
                </div>
                <div class="diag-row">
                    <span class="diag-label">Grounding</span>
                    <div class="diag-bar-container">
                        <div class="diag-bar-fill grounding" id="bar-grounding"></div>
                    </div>
                    <span class="diag-value" id="val-grounding">--</span>
                </div>
                <div class="diag-row">
                    <span class="diag-label">Self-loop</span>
                    <div class="diag-bar-container">
                        <div class="diag-bar-fill selfloop" id="bar-selfloop"></div>
                    </div>
                    <span class="diag-value" id="val-selfloop">--</span>
                </div>
                <div class="diag-row diag-meta">
                    <span id="diag-crisis" class="diag-badge hidden">CRISIS</span>
                    <span class="diag-interactions" id="diag-interactions">0 interactions</span>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <main class="chat-container" id="chat-container">
            <div class="messages" id="messages">
                <div class="message daedalus-message">
                    <div class="glass-bubble">
                        I am Daedalus. What is on your mind today?
                    </div>
                </div>
            </div>
            
            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area blur-effect">
            <form id="chat-form" autocomplete="off">
                <input type="text" id="user-input" placeholder="Message Daedalus..." autocomplete="off" required />
                <button type="submit" id="send-btn" aria-label="Send Message">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="/static/app.js?v=3"></script>
</body>
</html>
